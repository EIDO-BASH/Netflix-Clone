<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loader-screen">
    <div class="netflix-spinner d-none" id="spinner"></div>
  </div>
    <div
      class="c sign-in d-flex  justify-content-center align-items-center rounded-2 text-center vw-100 vw-lg-75"
    >
      <div class="dive" id="insertion_parent">
        <img
          src="./images/Logo.png"
          class="img-fluid mb-5"
          style="width: 100px"
        />
        <div class="display-5 mb-3" id="insertion_point" >sign-in</div>

        <!-- USERNAME INPUT -->
        <div class="input-group">
          <span class="input-group-text">
            <i class="fa-solid fa-id-badge" style="color: #e50914;"></i>
          </span>
          <div class="form-floating">
            <input
              type="text"
              class="form-control"
              id="floatingInputGroup1"
              placeholder="Username"
            />
            <label for="floatingInputGroup1">Username</label>
          </div>

          <!-- PASSWORD INPUT -->
        <div class="input-group my-4 my-lg-3">
          <span class="input-group-text">
            <i class="fa-regular fa-eye-slash" style="color: #e50914;"></i>
          </span>
          <div class="form-floating">
            <input
              type="password"
              class="form-control"
              id="floatingInputGroup2"
              placeholder="Username"
            />
            <label for="floatingInputGroup2">Password</label>
          </div>
        </div>

        <div class="d-flex justify-content-between w-100">
        <div class="btn btn-danger rounded-2 w-25" >
            <a  id="sign-in">sign in</a>
             </div>
        <div class="display-5">
            <a  id="create_acct">create account
                </a>
            </div>

        </div>

      </div>
    </div>
    <script src="app.js"></script>
    <script src="a.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
