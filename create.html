<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loader-screen">
    <div class="netflix-spinner d-none" id="spinner"></div>
  </div>
    <div
      class="c sign-in d-flex  justify-content-center align-items-center rounded-2 text-center"
    >
      <div class="dive " id="insertion_parent">
        <img
          src="./images/Logo.png"
          class="img-fluid "
          style="width: 100px"
        />
        <h3 class="display-5 mb-3">Login</h3>
        <p class="display-5 mb-3" id="insertion_point"></p>
         <form>
        <!-- USERNAME INPUT -->
        <div class="create input-group  w-full lg:w-1/2">
          <span class="input-group-text">
            <i class="fa-solid fa-id-badge" style="color: #e50914;"></i>
          </span>
      

         
          <div class="form-floating">
            <input
              type="text"
              class="form-control"
              id="floatingInputGroup1"
              placeholder="Username"
            />
            <label for="floatingInputGroup1">Name</label>
          </div>

          <!-- PASSWORD INPUT -->
        <div class="create input-group my-4 my-lg-3">
          <span class="input-group-text">
            <i class="fa-regular fa-eye-slash" style="color: #e50914;"></i>
          </span>
          <div class="form-floating">
            <input
              type="password"
              class="form-control"
              id="floatingInputGroup2"
              placeholder="password"
            />
            <label for="floatingInputGroup2">Enter a Password</label>
          </div>
        </div>
        <div class="create input-group ">
          <span class="input-group-text">
            <i class="fa-regular fa-eye-slash" style="color: #e50914;"></i>
          </span>
          <div class="form-floating">
            <input
              type="password"
              class="form-control"
              id="floatingInputGroup3"
              placeholder="password"
            />
            <label for="floatingInputGroup3">Confirm Password</label>
          </div>
        </div>
        <div class="create input-group my-4 my-lg-3">
          <span class="input-group-text">
            <i class="fa-regular fa-envelope" style="color: #e50914;"></i>
          </span>
          <div class="form-floating">
            <input
              type="email"
              class="form-control"
              id="floatingInputGroup4"
              placeholder="email"
            />
            <label for="floatingInputGroup4">Email</label>
          </div>
        </div>

        <div class="create d-flex justify-content-center w-100" >

        
          <div class="btn btn-danger rounded-2 w-50" >
            <a  id="sign">create account</a>
             </div>
       
</form> 
        </div>

      </div>
    </div>
    <script src="a.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
